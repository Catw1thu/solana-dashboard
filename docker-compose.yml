x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: solana-dashboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dashboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dashboard}
      POSTGRES_DB: ${POSTGRES_DB:-solana_dashboard}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-54329}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dashboard} -d ${POSTGRES_DB:-solana_dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 20
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: solana-dashboard-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no", "--dir", "/data"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-63799}:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    logging: *default-logging

  nats:
    image: nats:2.10
    container_name: solana-dashboard-nats
    restart: unless-stopped
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "127.0.0.1:${NATS_PORT:-4222}:4222"
      - "127.0.0.1:${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - ./data/nats:/data
    logging: *default-logging

  migrate:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.migrate
    container_name: solana-dashboard-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-dashboard}:${POSTGRES_PASSWORD:-dashboard}@postgres:5432/${POSTGRES_DB:-solana_dashboard}?sslmode=disable
    logging: *default-logging

  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.api
    container_name: solana-dashboard-backend
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_started
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-dashboard}:${POSTGRES_PASSWORD:-dashboard}@postgres:5432/${POSTGRES_DB:-solana_dashboard}?sslmode=disable
      API_ADDR: 0.0.0.0:8080
      NATS_URL: nats://nats:4222
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8081}:8080"
    logging: *default-logging

  parser:
    build:
      context: ./parser
      dockerfile: docker/Dockerfile.rust
    container_name: solana-dashboard-parser
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      GRPC_ENDPOINT: ${GRPC_ENDPOINT:?set in .env}
      GRPC_TOKEN: ${GRPC_TOKEN:?set in .env}
      DATABASE_URL: postgres://${POSTGRES_USER:-dashboard}:${POSTGRES_PASSWORD:-dashboard}@postgres:5432/${POSTGRES_DB:-solana_dashboard}?sslmode=disable
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      CAPTURE_SAMPLES: ${CAPTURE_SAMPLES:-0}
      LISTEN_SECONDS: ${LISTEN_SECONDS:-315360000}
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://127.0.0.1:8081}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://127.0.0.1:8081}
    container_name: solana-dashboard-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3001}:3000"
    logging: *default-logging
